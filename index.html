<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <meta name="description" content="SuchnaX Link - Proudly built for India's digital institutions. Secure circular management system with multilingual support." />
  <meta name="theme-color" content="#0A1F3C" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Preconnect to critical origins (limit to 3) -->
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="preconnect" href="https://res.cloudinary.com">
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  
  <!-- Fonts - Fully async with media trick to prevent render blocking -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Noto+Sans:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;500;600;700;800;900&family=Noto+Sans+Telugu:wght@400;500;600;700;800;900&family=Noto+Sans+Tamil:wght@400;500;600;700;800;900&family=Noto+Sans+Kannada:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Noto+Sans:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;500;600;700;800;900&family=Noto+Sans+Telugu:wght@400;500;600;700;800;900&family=Noto+Sans+Tamil:wght@400;500;600;700;800;900&family=Noto+Sans+Kannada:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"></noscript>
  
  <!-- Inline critical CSS for instant render -->
  <style>
    *,::before,::after{box-sizing:border-box;border-width:0;border-style:solid;border-color:#e5e7eb}
    html{line-height:1.5;-webkit-text-size-adjust:100%;font-family:Inter,Outfit,system-ui,sans-serif;tab-size:4;overflow-x:hidden}
    body{margin:0;line-height:inherit;background:#f8f9fa;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    #root{min-height:100vh}
    .loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8f9fa}
    button,input,select,textarea{font-family:inherit;font-size:100%;line-height:1.15;margin:0}
    button,a,[type="button"],[type="submit"]{cursor:pointer;-webkit-tap-highlight-color:rgba(26,115,232,0.1);touch-action:manipulation}
    .btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;padding:0 1.5rem;height:2.75rem;background:#1a73e8;color:#fff;font-weight:900;border-radius:0.75rem;text-transform:uppercase;letter-spacing:0.05em;font-size:0.6875rem;transition:all 0.2s}
    .btn-primary:hover{background:#1557b0}
    .glass-card{background:rgba(255,255,255,0.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(229,231,235,0.3);box-shadow:0 10px 15px -3px rgba(0,0,0,0.1)}
    .input-modern{width:100%;height:2.75rem;padding:0 1rem;background:#fff;border:1px solid #e5e7eb;border-radius:0.75rem;outline:none;transition:all 0.2s;font-size:0.875rem}
    .input-modern:focus{border-color:#1a73e8;box-shadow:0 0 0 4px rgba(26,115,232,0.05)}
    @media(max-width:640px){.input-modern{font-size:16px}}
  </style>

  <title>SuchnaX Link | Digital Governance Platform</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
